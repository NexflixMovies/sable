<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SABLE — Product</title>
  <meta name="theme-color" content="#060402">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="sable.css">
</head>
<body>

<nav id="navbar" class="visible">
  <a href="index.html" class="nav-logo">SABLE</a>
  <ul class="nav-links">
    <li><a href="index.html">Shop</a></li>
    <li><a href="index.html#wardrobe">Collections</a></li>
    <li><a href="#">About</a></li>
  </ul>
  <div class="nav-right">
    <a href="cart.html" class="nav-cart">
      &#128092;
      <span class="cart-badge" style="display:none">0</span>
    </a>
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div id="mobile-menu">
  <button class="menu-close" id="menu-close">&times;</button>
  <a href="index.html">Shop</a>
  <a href="index.html#wardrobe">Collections</a>
  <a href="#">About</a>
  <a href="cart.html">Cart</a>
</div>

<div class="page-wrap">
  <div class="pd-grid">

    <div class="pd-img-col">
      <a href="index.html" class="back-link">&#8592; Back to wardrobe</a>

      <div class="pd-almirah-frame">
        <div class="pd-frame-cornice">
          <span>◈</span>
          <span style="font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:0.5em;color:rgba(200,160,50,0.65);">SABLE</span>
          <span>◈</span>
        </div>
        <div class="pd-frame-rod"></div>
        <div class="pd-img-wrap">
          <img id="pd-img" src="" alt="" loading="eager">
          <div class="pd-img-badge" id="pd-img-badge" style="display:none"></div>
        </div>
      </div>

      <div class="pd-thumbs" id="pd-thumbs"></div>
    </div>

    <div class="pd-info">
      <div class="pd-cat" id="pd-cat"></div>
      <h1 class="pd-name" id="pd-name"></h1>
      <div class="pd-orn">
        <div class="pd-orn-line"></div>
        <span class="pd-orn-diamond">◆</span>
        <div class="pd-orn-line right"></div>
      </div>
      <div class="pd-pricing">
        <span class="pd-price" id="pd-price"></span>
        <span class="pd-oprice" id="pd-oprice"></span>
        <span class="pd-discount" id="pd-discount"></span>
      </div>
      <p class="pd-desc" id="pd-desc"></p>

      <div class="sel-label">Select Size</div>
      <div class="size-opts" id="pd-sizes"></div>

      <div class="sel-label">Colour</div>
      <div class="color-opts" id="pd-colors"></div>

      <div class="pd-actions">
        <button class="btn-gold" id="btn-cart">Add to Cart</button>
        <button class="btn-outline" id="btn-buy">Buy Now</button>
      </div>

      <div class="pd-details">
        <div class="pd-detail-row">
          <span class="pd-detail-icon">✦</span>
          <span>Complimentary shipping on orders above ₹999</span>
        </div>
        <div class="pd-detail-row">
          <span class="pd-detail-icon">✦</span>
          <span>Effortless 15-day returns</span>
        </div>
        <div class="pd-detail-row">
          <span class="pd-detail-icon">✦</span>
          <span>Certified SABLE craftsmanship</span>
        </div>
        <div class="pd-detail-row">
          <span class="pd-detail-icon">✦</span>
          <span>Delivered in signature black packaging</span>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast" class="toast"></div>
<script src="sable.js" defer></script>
</body>
</html>
