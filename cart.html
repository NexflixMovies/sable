<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SABLE — Cart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;0,6..96,800;0,6..96,900;1,6..96,400;1,6..96,700&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#c8a84b;--gold-light:#e8d5a0;--dark:#0a0300;--text:#d4c4a8;--text-dim:#8a7a64;}
html{scroll-behavior:smooth;}
body{background:#0a0300;color:var(--text);font-family:'Jost',sans-serif;font-weight:200;min-height:100vh;}
*{cursor:none!important;}
#cursor{position:fixed;width:8px;height:8px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;}
#cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(200,168,75,.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:28px 60px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,3,0,.97);border-bottom:1px solid rgba(200,168,75,.12);}
.nav-logo{font-family:'Bodoni Moda',serif;font-size:2rem;font-weight:300;letter-spacing:.5em;color:var(--gold);text-decoration:none;}
.nav-back{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;transition:color .3s;display:flex;align-items:center;gap:10px;}
.nav-back::before{content:'←';}
.nav-back:hover{color:var(--gold);}
.nav-right{display:flex;gap:24px;align-items:center;}
.nav-right a{font-size:.6rem;letter-spacing:.2em;color:var(--text-dim);text-decoration:none;transition:color .3s;}
.nav-right a:hover{color:var(--gold);}

.page{max-width:1000px;margin:0 auto;padding:140px 60px 100px;}
.page-eyebrow{font-size:.55rem;letter-spacing:.6em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
.page-title{font-family:'Bodoni Moda',serif;font-size:clamp(2.4rem,5vw,4rem);font-weight:300;color:#fff;letter-spacing:.06em;margin-bottom:56px;}

.skel{animation:shimmer 1.6s ease-in-out infinite;background:linear-gradient(90deg,rgba(61,21,0,.7) 25%,rgba(100,40,10,.4) 50%,rgba(61,21,0,.7) 75%);background-size:200% 100%;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skel-row{height:90px;border-radius:4px;margin-bottom:16px;}

.cart-wrap{display:grid;grid-template-columns:1fr 340px;gap:60px;align-items:start;}

.cart-item{
  display:grid;grid-template-columns:72px 1fr auto;gap:24px;
  align-items:center;padding:24px 0;
  border-bottom:1px solid rgba(200,168,75,.1);
  opacity:0;transform:translateX(-16px);
  transition:opacity .5s ease,transform .5s ease;
}
.cart-item.in{opacity:1;transform:translateX(0);}
.item-img-wrap{
  width:72px;height:90px;
  background:linear-gradient(to bottom,#3d1500,#0a0300);
  border:1px solid rgba(200,168,75,.15);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.item-img-wrap img{width:60px;height:80px;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,.7));}
.item-name{font-family:'Bodoni Moda',serif;font-size:1.1rem;font-weight:300;color:#e8d5c0;letter-spacing:.04em;margin-bottom:6px;}
.item-size{font-size:.5rem;letter-spacing:.35em;text-transform:uppercase;color:var(--text-dim);}
.item-price{font-family:'Bodoni Moda',serif;font-size:1.05rem;color:var(--gold);margin-top:10px;}
.item-controls{display:flex;flex-direction:column;align-items:flex-end;gap:12px;}
.qty-row{display:flex;align-items:center;gap:0;border:1px solid rgba(200,168,75,.25);}
.qty-btn{width:30px;height:30px;background:transparent;border:none;color:var(--gold);font-size:.8rem;transition:background .2s;}
.qty-btn:hover{background:rgba(200,168,75,.12);}
.qty-val{width:32px;height:30px;display:flex;align-items:center;justify-content:center;font-size:.65rem;letter-spacing:.1em;border-left:1px solid rgba(200,168,75,.2);border-right:1px solid rgba(200,168,75,.2);}
.remove-btn{font-size:.48rem;letter-spacing:.3em;text-transform:uppercase;color:var(--text-dim);background:none;border:none;transition:color .3s;padding:4px 0;}
.remove-btn:hover{color:rgba(200,80,80,.8);}

.cart-empty{text-align:center;padding:80px 0;color:var(--text-dim);}
.cart-empty-icon{font-family:'Bodoni Moda',serif;font-size:4rem;color:rgba(200,168,75,.2);margin-bottom:20px;}
.cart-empty p{font-size:.68rem;letter-spacing:.2em;margin-bottom:28px;}
.cart-empty a{font-size:.58rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(200,168,75,.3);padding-bottom:4px;}

.order-summary{background:linear-gradient(to bottom,rgba(61,21,0,.4),rgba(10,3,0,.6));border:1px solid rgba(200,168,75,.18);padding:32px;position:sticky;top:120px;}
.summary-title{font-size:.55rem;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);margin-bottom:28px;}
.summary-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(200,168,75,.08);}
.summary-key{font-size:.6rem;letter-spacing:.1em;color:var(--text-dim);}
.summary-val{font-size:.65rem;color:var(--text);}
.summary-total{display:flex;justify-content:space-between;padding:20px 0 24px;}
.summary-total-key{font-size:.55rem;letter-spacing:.35em;text-transform:uppercase;color:var(--text-dim);}
.summary-total-val{font-family:'Bodoni Moda',serif;font-size:1.6rem;font-weight:300;color:var(--gold);}
.btn-checkout{display:block;width:100%;padding:18px;text-align:center;background:var(--gold);color:#0a0300;border:none;font-family:'Jost',sans-serif;font-size:.6rem;letter-spacing:.4em;text-transform:uppercase;text-decoration:none;transition:background .3s;margin-bottom:12px;}
.btn-checkout:hover{background:var(--gold-light);}
.btn-continue{display:block;width:100%;padding:16px;text-align:center;background:transparent;color:var(--text-dim);border:1px solid rgba(200,168,75,.2);font-family:'Jost',sans-serif;font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;text-decoration:none;transition:all .3s;}
.btn-continue:hover{color:var(--gold);border-color:rgba(200,168,75,.5);}
.summary-note{font-size:.48rem;letter-spacing:.15em;color:var(--text-dim);text-align:center;margin-top:20px;line-height:1.8;}
</style>
<style>
@media screen and (max-width:768px){
  *{cursor:auto!important;}
  #cursor,#cursor-ring{display:none!important;}
  nav{padding:16px 20px;}
  .nav-logo{font-size:1.4rem;letter-spacing:.3em;}
  .page{padding:100px 20px 80px;}
  .page-title{font-size:2rem;margin-bottom:36px;}
  .cart-wrap{grid-template-columns:1fr;gap:36px;}
  .order-summary{position:static;}
  .cart-item{grid-template-columns:60px 1fr auto;gap:14px;padding:18px 0;}
  .item-img-wrap{width:60px;height:74px;}
  .item-img-wrap img{width:48px;height:62px;}
  .item-name{font-size:.95rem;}
}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<nav>
  <a href="/" class="nav-back">Shop</a>
  <a href="/" class="nav-logo">Sable</a>
  <div class="nav-right">
    <a href="/checkout.html">Checkout</a>
  </div>
</nav>

<div class="page">
  <p class="page-eyebrow">Your Selection</p>
  <h1 class="page-title">Shopping Cart</h1>

  <div id="skeleton-area">
    <div class="cart-wrap">
      <div>
        <div class="skel skel-row"></div>
        <div class="skel skel-row"></div>
        <div class="skel skel-row"></div>
      </div>
      <div style="height:320px;border-radius:4px;" class="skel"></div>
    </div>
  </div>

  <div id="cart-content" style="display:none;">
    <div class="cart-wrap">
      <div id="item-list"></div>
      <div class="order-summary">
        <div class="summary-title">Order Summary</div>
        <div class="summary-row"><span class="summary-key">Subtotal</span><span class="summary-val" id="sum-sub">—</span></div>
        <div class="summary-row"><span class="summary-key">Shipping</span><span class="summary-val">Complimentary</span></div>
        <div class="summary-row"><span class="summary-key">Duties & Taxes</span><span class="summary-val">Calculated at checkout</span></div>
        <div class="summary-total">
          <span class="summary-total-key">Total</span>
          <span class="summary-total-val" id="sum-total">—</span>
        </div>
        <a href="/checkout.html" class="btn-checkout">Proceed to Checkout</a>
        <a href="/" class="btn-continue">Continue Shopping</a>
        <p class="summary-note">Complimentary shipping on all orders · Secure checkout · Easy returns within 14 days</p>
      </div>
    </div>
  </div>
</div>

<script src="products.js"></script>
<script>
const isMobile = window.matchMedia('(max-width:768px)').matches;
if (!isMobile) {
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  (function loop(){
    cursor.style.left=mx+'px';cursor.style.top=my+'px';
    rx+=(mx-rx)*.18;ry+=(my-ry)*.18;
    ring.style.left=rx+'px';ring.style.top=ry+'px';
    requestAnimationFrame(loop);
  })();
  document.querySelectorAll('a,button').forEach(el=>{
    el.addEventListener('mouseenter',()=>{ring.style.width='56px';ring.style.height='56px';ring.style.borderColor='rgba(200,168,75,.8)';});
    el.addEventListener('mouseleave',()=>{ring.style.width='36px';ring.style.height='36px';ring.style.borderColor='rgba(200,168,75,.4)';});
  });
}

function getCart(){ return JSON.parse(localStorage.getItem('sable_cart')||'[]'); }
function saveCart(c){ localStorage.setItem('sable_cart',JSON.stringify(c)); }
function fmt(n){ return '$'+n.toLocaleString(); }

function renderCart(){
  const cart = getCart();
  const list = document.getElementById('item-list');
  list.innerHTML='';

  if(!cart.length){
    list.innerHTML=`<div class="cart-empty">
      <div class="cart-empty-icon">∅</div>
      <p>Your cart is empty</p>
      <a href="/">Return to Collection</a>
    </div>`;
    document.getElementById('sum-sub').textContent='$0';
    document.getElementById('sum-total').textContent='$0';
    return;
  }

  let sub=0;
  cart.forEach((item,i)=>{
    const prod = products.find(p=>p.id===item.id)||{image:'hoodie.png'};
    sub += item.price * item.qty;
    const el = document.createElement('div');
    el.className='cart-item';
    el.style.transitionDelay=(i*.08)+'s';
    el.innerHTML=`
      <div class="item-img-wrap">
        <img src="${prod.image}" alt="${item.name}" loading="lazy">
      </div>
      <div>
        <div class="item-name">${item.name}</div>
        <div class="item-size">Size: ${item.size}</div>
        <div class="item-price">${fmt(item.price)}</div>
      </div>
      <div class="item-controls">
        <div class="qty-row">
          <button class="qty-btn" data-id="${item.id}" data-size="${item.size}" data-action="dec">−</button>
          <span class="qty-val">${item.qty}</span>
          <button class="qty-btn" data-id="${item.id}" data-size="${item.size}" data-action="inc">+</button>
        </div>
        <button class="remove-btn" data-id="${item.id}" data-size="${item.size}">Remove</button>
      </div>`;
    list.appendChild(el);
    requestAnimationFrame(()=>el.classList.add('in'));
  });

  document.getElementById('sum-sub').textContent = fmt(sub);
  document.getElementById('sum-total').textContent = fmt(sub);

  list.querySelectorAll('.qty-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const c=getCart();
      const idx=c.findIndex(i=>i.id===parseInt(btn.dataset.id)&&i.size===btn.dataset.size);
      if(idx===-1) return;
      if(btn.dataset.action==='inc') c[idx].qty++;
      else { c[idx].qty--; if(c[idx].qty<=0) c.splice(idx,1); }
      saveCart(c); renderCart();
    });
  });
  list.querySelectorAll('.remove-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const c=getCart().filter(i=>!(i.id===parseInt(btn.dataset.id)&&i.size===btn.dataset.size));
      saveCart(c); renderCart();
    });
  });
}

setTimeout(()=>{
  document.getElementById('skeleton-area').style.display='none';
  document.getElementById('cart-content').style.display='block';
  renderCart();
}, 600);
</script>
</body>
</html>
