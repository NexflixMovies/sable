<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SABLE — Product</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;0,6..96,800;0,6..96,900;1,6..96,400;1,6..96,700&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#c8a84b;--gold-light:#e8d5a0;--dark:#0a0300;--text:#d4c4a8;--text-dim:#8a7a64;}
html{scroll-behavior:smooth;}
body{background:#0a0300;color:var(--text);font-family:'Jost',sans-serif;font-weight:200;min-height:100vh;}
*{cursor:none!important;}
#cursor{position:fixed;width:8px;height:8px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;}
#cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(200,168,75,.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s;}
.trail-dot{position:fixed;width:4px;height:4px;border-radius:50%;background:rgba(200,168,75,.35);pointer-events:none;z-index:9996;transform:translate(-50%,-50%);}
.click-burst{position:fixed;pointer-events:none;z-index:9995;border-radius:50%;animation:clickBurst .55s cubic-bezier(.23,1,.32,1) forwards;}
@keyframes clickBurst{0%{width:6px;height:6px;opacity:.9;transform:translate(-50%,-50%) scale(1);}100%{width:80px;height:80px;opacity:0;transform:translate(-50%,-50%) scale(1);}}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:28px 60px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,3,0,.97);border-bottom:1px solid rgba(200,168,75,.12);}
.nav-logo{font-family:'Bodoni Moda',serif;font-size:2rem;font-weight:300;letter-spacing:.5em;color:var(--gold);text-decoration:none;}
.nav-back{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;transition:color .3s;display:flex;align-items:center;gap:10px;}
.nav-back::before{content:'←';}
.nav-back:hover{color:var(--gold);}
.nav-right{display:flex;gap:24px;align-items:center;}
.nav-right a{font-size:.6rem;letter-spacing:.2em;color:var(--text-dim);text-decoration:none;transition:color .3s;}
.nav-right a:hover{color:var(--gold);}
.cart-count{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--gold);color:#0a0300;font-size:.45rem;margin-left:4px;vertical-align:middle;}

.page{max-width:1100px;margin:0 auto;padding:130px 60px 100px;}
.product-wrap{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;}

/* Box display */
.product-box-col{display:flex;justify-content:center;}
.box{
  width:260px;height:450px;
  background:linear-gradient(to bottom,#3d1500f9 0%,#220a00 55%,#0a0300 100%);
  border-radius:10px;
  box-shadow:inset 0 0 40px rgba(0,0,0,.9),inset 4px 0 1px rgba(0,0,0,.5),inset -4px 0 1px rgba(0,0,0,.5),0 20px 60px rgba(0,0,0,.7),0 4px 12px rgba(0,0,0,.5);
  position:relative;
}
.box-top{width:100%;height:140px;background:linear-gradient(to bottom,#8b3506,#2e0f00);border-radius:10px 10px 0 0;box-shadow:inset 0 0 18px rgba(0,0,0,.7);position:relative;overflow:hidden;pointer-events:none;user-select:none;}
.box-top::after{content:"";width:264px;height:250px;background:linear-gradient(to bottom,#381300 0%,#2e0f00 38%,#0a0300 100%);border-radius:50%;position:absolute;left:-2px;top:45px;box-shadow:inset 0 -2px 20px black,0 0 10px black;z-index:2;}
.box-pipe2{height:7px;width:100px;background:linear-gradient(to bottom,#e8d5a0 0%,#c8a84b 20%,#8b6914 50%,#5a4008 75%,#3a2805 100%);position:absolute;top:105px;left:123px;z-index:5;border-radius:2px;}
.box-pipe{width:227px;height:7px;background:linear-gradient(to bottom,#e8d5a0 0%,#c8a84b 20%,#8b6914 50%,#5a4008 75%,#3a2805 100%);position:relative;top:-35px;left:16px;z-index:5;border-radius:10px;box-shadow:0 3px 8px rgba(0,0,0,.8),0 1px 0 rgba(255,220,120,.4),inset 0 1px 2px rgba(255,240,180,.5);}
.box-img{height:330px;width:260px;position:relative;top:-59px;z-index:4;filter:drop-shadow(0 8px 20px rgba(0,0,0,.9)) drop-shadow(0 2px 4px rgba(0,0,0,.6));pointer-events:none;user-select:none;will-change:top,scale;}
@keyframes productImg{0%{top:-59px;}10%{top:-67px;}70%{top:-35px;}100%{top:-55px;scale:1.07;z-index:8;}}

/* Product details */
.product-detail{padding-top:20px;opacity:0;transform:translateX(30px);animation:slideIn .8s .3s forwards ease-out;}
@keyframes slideIn{to{opacity:1;transform:translateX(0);}}
.product-eyebrow{font-size:.5rem;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
.product-title{font-family:'Bodoni Moda',serif;font-size:clamp(2rem,4vw,3rem);font-weight:300;color:#fff;letter-spacing:.06em;margin-bottom:12px;line-height:1.1;}
.product-price{font-family:'Bodoni Moda',serif;font-size:2.2rem;font-weight:300;color:var(--gold);letter-spacing:.05em;margin-bottom:28px;}
.product-desc{font-size:.7rem;line-height:2.2;color:var(--text-dim);letter-spacing:.04em;margin-bottom:36px;padding-bottom:36px;border-bottom:1px solid rgba(200,168,75,.12);}

.size-label{font-size:.5rem;letter-spacing:.45em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;}
.size-grid{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px;}
.size-btn{
  width:44px;height:44px;border:1px solid rgba(200,168,75,.3);
  background:transparent;color:var(--text-dim);
  font-family:'Jost',sans-serif;font-size:.58rem;letter-spacing:.1em;
  transition:all .25s;
}
.size-btn:hover,.size-btn.selected{border-color:var(--gold);color:var(--gold);background:rgba(200,168,75,.08);}

.btn-add{
  display:block;width:100%;padding:18px;text-align:center;
  background:var(--gold);color:#0a0300;border:none;
  font-family:'Jost',sans-serif;font-size:.62rem;letter-spacing:.45em;text-transform:uppercase;
  transition:background .3s;margin-bottom:14px;
}
.btn-add:hover{background:var(--gold-light);}
.btn-add:disabled{opacity:.5;background:rgba(200,168,75,.3);color:var(--text-dim);}
.btn-cart{
  display:block;width:100%;padding:16px;text-align:center;
  background:transparent;color:var(--text-dim);border:1px solid rgba(200,168,75,.2);
  font-family:'Jost',sans-serif;font-size:.6rem;letter-spacing:.35em;text-transform:uppercase;
  text-decoration:none;transition:all .3s;
}
.btn-cart:hover{color:var(--gold);border-color:rgba(200,168,75,.5);}
.add-note{font-size:.48rem;letter-spacing:.18em;color:var(--text-dim);text-align:center;margin-top:20px;line-height:1.8;}

/* Toast */
#toast{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);
  background:linear-gradient(to right,rgba(61,21,0,.95),rgba(34,10,0,.95));
  border:1px solid rgba(200,168,75,.35);
  padding:14px 32px;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--gold);pointer-events:none;opacity:0;transition:opacity .3s,transform .3s;z-index:8000;
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
<style>
@media screen and (max-width:768px){
  *{cursor:auto!important;}
  #cursor,#cursor-ring{display:none!important;}
  nav{padding:16px 20px;}
  .nav-logo{font-size:1.4rem;letter-spacing:.3em;}
  .page{padding:100px 20px 80px;}
  .product-wrap{grid-template-columns:1fr;gap:40px;}
  .product-box-col{justify-content:center;}
  .product-title{font-size:1.8rem;}
  .product-price{font-size:1.8rem;}
}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="toast"></div>

<nav>
  <a href="/" class="nav-back">Collection</a>
  <a href="/" class="nav-logo">Sable</a>
  <div class="nav-right">
    <a href="/cart.html">Cart <span class="cart-count" id="cart-count">0</span></a>
    <a href="/checkout.html">Checkout</a>
  </div>
</nav>

<div class="page" id="page-content" style="display:none;">
  <div class="product-wrap">
    <div class="product-box-col">
      <div class="box">
        <div class="box-top"><img id="box-design" src="" style="width:260px;pointer-events:none;user-select:none;"></div>
        <div class="box-pipe2"></div>
        <div class="box-pipe"></div>
        <img id="box-img" class="box-img" src="">
      </div>
    </div>
    <div class="product-detail">
      <div class="product-eyebrow" id="prod-category"></div>
      <h1 class="product-title" id="prod-name"></h1>
      <div class="product-price" id="prod-price"></div>
      <p class="product-desc" id="prod-desc"></p>
      <div class="size-label">Select Size</div>
      <div class="size-grid" id="size-grid"></div>
      <button class="btn-add" id="btn-add" disabled>Select a Size</button>
      <a href="/cart.html" class="btn-cart">View Cart</a>
      <p class="add-note">Complimentary shipping · 14-day returns · Ethically made</p>
    </div>
  </div>
</div>

<script src="products.js"></script>
<script>
const isMobile = window.matchMedia('(max-width:768px)').matches;
if (!isMobile) {
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;
  const trailCount=8,trailDots=[],trailPos=[];
  for(let i=0;i<trailCount;i++){
    const d=document.createElement('div'); d.className='trail-dot';
    d.style.opacity=(1-i/trailCount)*.5+''; d.style.width=(4-i*.3)+'px'; d.style.height=(4-i*.3)+'px';
    document.body.appendChild(d); trailDots.push(d); trailPos.push({x:0,y:0});
  }
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  document.addEventListener('mousedown',()=>{cursor.style.transform='translate(-50%,-50%) scale(.7)';});
  document.addEventListener('mouseup',()=>{cursor.style.transform='translate(-50%,-50%) scale(1)';});
  (function loop(){
    cursor.style.left=mx+'px';cursor.style.top=my+'px';
    rx+=(mx-rx)*.18;ry+=(my-ry)*.18;
    ring.style.left=rx+'px';ring.style.top=ry+'px';
    trailPos.unshift({x:mx,y:my}); if(trailPos.length>trailCount) trailPos.pop();
    trailDots.forEach((d,i)=>{if(trailPos[i]){d.style.left=trailPos[i].x+'px';d.style.top=trailPos[i].y+'px';}});
    requestAnimationFrame(loop);
  })();
  document.querySelectorAll('a,button').forEach(el=>{
    el.addEventListener('mouseenter',()=>{ring.style.width='56px';ring.style.height='56px';ring.style.borderColor='rgba(200,168,75,.8)';});
    el.addEventListener('mouseleave',()=>{ring.style.width='36px';ring.style.height='36px';ring.style.borderColor='rgba(200,168,75,.4)';});
  });
  document.addEventListener('click',e=>{
    const x=e.clientX,y=e.clientY;
    const r1=document.createElement('div'); r1.className='click-burst';
    r1.style.cssText=`left:${x}px;top:${y}px;border:1px solid rgba(200,168,75,.8);background:transparent;`;
    document.body.appendChild(r1);
    const r2=document.createElement('div'); r2.className='click-burst';
    r2.style.cssText=`left:${x}px;top:${y}px;border:1px solid rgba(200,168,75,.4);background:transparent;animation-delay:.08s;animation-duration:.65s;`;
    document.body.appendChild(r2);
    for(let i=0;i<6;i++){
      const p=document.createElement('div'),a=(i/6)*Math.PI*2,dist=22+Math.random()*14;
      p.style.cssText=`position:fixed;pointer-events:none;z-index:9994;width:3px;height:3px;border-radius:50%;background:rgba(200,168,75,.9);left:${x}px;top:${y}px;transform:translate(-50%,-50%);`;
      document.body.appendChild(p);
      p.animate([{transform:'translate(-50%,-50%)',opacity:1},{transform:`translate(calc(-50% + ${Math.cos(a)*dist}px),calc(-50% + ${Math.sin(a)*dist}px))`,opacity:0}],{duration:420,easing:'cubic-bezier(.23,1,.32,1)',fill:'forwards'});
      setTimeout(()=>p.remove(),450);
    }
    setTimeout(()=>{r1.remove();r2.remove();},700);
  });
}

function getCart(){ return JSON.parse(localStorage.getItem('sable_cart')||'[]'); }
function saveCart(c){ localStorage.setItem('sable_cart',JSON.stringify(c)); }
function updateCartBadge(){ document.getElementById('cart-count').textContent=getCart().reduce((s,i)=>s+i.qty,0); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

const params = new URLSearchParams(location.search);
const id = parseInt(params.get('id'));
const p = products.find(x=>x.id===id);

if(p){
  document.title = `SABLE — ${p.name}`;
  document.getElementById('box-design').src = p.design;
  document.getElementById('box-img').src = p.image;
  document.getElementById('prod-category').textContent = p.category;
  document.getElementById('prod-name').textContent = p.name;
  document.getElementById('prod-price').textContent = p.price;
  document.getElementById('prod-desc').textContent = p.description;

  /* Sizes */
  const sizeGrid = document.getElementById('size-grid');
  let selectedSize = null;
  p.sizes.forEach(sz=>{
    const btn = document.createElement('button');
    btn.className='size-btn'; btn.textContent=sz;
    btn.addEventListener('click',()=>{
      sizeGrid.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedSize=sz;
      const addBtn = document.getElementById('btn-add');
      addBtn.disabled=false;
      addBtn.textContent='Add to Cart';
    });
    sizeGrid.appendChild(btn);
  });

  /* Add to cart */
  document.getElementById('btn-add').addEventListener('click',()=>{
    if(!selectedSize) return;
    const cart = getCart();
    const idx = cart.findIndex(i=>i.id===p.id&&i.size===selectedSize);
    if(idx>-1) cart[idx].qty++;
    else cart.push({id:p.id,name:p.name,price:p.priceRaw,size:selectedSize,qty:1});
    saveCart(cart);
    updateCartBadge();
    showToast('Added to cart');
  });

  document.getElementById('page-content').style.display='block';

  /* Box hover animation */
  const boxImg = document.getElementById('box-img');
  if(!isMobile){
    boxImg.style.pointerEvents='auto';
    boxImg.addEventListener('mouseenter',()=>{
      boxImg.style.animation='none'; void boxImg.offsetWidth;
      boxImg.style.animation='productImg 2s forwards ease-in-out';
    });
    boxImg.addEventListener('mouseleave',()=>{
      boxImg.style.animation='none'; void boxImg.offsetWidth;
      boxImg.style.animation='productImg 2s reverse forwards ease-in-out';
    });
  } else {
    boxImg.style.pointerEvents='auto';
    boxImg.addEventListener('touchstart',e=>{
      e.preventDefault();
      boxImg.style.animation='none'; void boxImg.offsetWidth;
      boxImg.style.animation='productImg 2s forwards ease-in-out';
      setTimeout(()=>{
        boxImg.style.animation='none'; void boxImg.offsetWidth;
        boxImg.style.animation='productImg 2s reverse forwards ease-in-out';
      },3200);
    },{passive:false});
  }

  updateCartBadge();
} else {
  document.getElementById('page-content').innerHTML='<p style="padding-top:40px;color:var(--text-dim);font-size:.7rem;letter-spacing:.2em;">Product not found. <a href="/" style="color:var(--gold);">Return to collection</a></p>';
  document.getElementById('page-content').style.display='block';
}
</script>
</body>
</html>
